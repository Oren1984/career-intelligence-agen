# This workflow runs on pushes to main, dev, and feature branches, as well as on pull requests to main.
# It performs linting, import validation, and runs the test suite with coverage reporting.

name: CI

# Trigger on pushes to main, dev, and any feature branches, as well as pull requests to main
on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main"]

    #  schedule:
#    - cron: "0 7 * * 1"   # Weekly on Monday at 07:00 UTC
jobs:
  lint-and-test:
    name: Lint, Format, Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

        # Run linting and tests on both Python 3.11 and 3.12 to ensure compatibility
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 app/ scripts/ tests/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__,.git

      - name: Validate imports
        run: |
          python -c "from app.collectors.israel.drushim_collector import DrushimCollector; print('OK: DrushimCollector')"
          python -c "from app.collectors.israel.alljobs_collector import AllJobsCollector; print('OK: AllJobsCollector')"
          python -c "from app.dedup.dedup_engine import DedupEngine; print('OK: DedupEngine')"
          python -c "from app.notifications.console_notifier import ConsoleNotifier; print('OK: ConsoleNotifier')"
          python -c "from app.notifications.file_notifier import FileNotifier; print('OK: FileNotifier')"
          python -c "from app.notifications.notification_orchestrator import NotificationOrchestrator; print('OK: NotificationOrchestrator')"
          python -c "from app.integrations.gmail.gmail_mock import GmailMockClient; print('OK: GmailMockClient')"

      - name: Run tests
        run: |
          pytest tests/ \
            --tb=short \
            -q \
            --cov=app \
            --cov-report=term-missing \
            --ignore=tests/test_dashboard.py

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: .coverage
