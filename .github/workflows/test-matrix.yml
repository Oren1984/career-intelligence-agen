# This workflow runs a test matrix on multiple Python versions and operating systems.
# It is triggered on pushes and pull requests to main, as well as on a weekly schedule

name: Test Matrix

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"   # Weekly on Monday at 06:00 UTC

jobs:
  test-matrix:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest tests/ -q --tb=short --ignore=tests/test_dashboard.py

      - name: Validate core imports
        run: |
          python -c "from app.collectors.israel.drushim_collector import DrushimCollector"
          python -c "from app.dedup.dedup_engine import DedupEngine"
          python -c "from app.notifications.notification_orchestrator import NotificationOrchestrator"
