# This workflow automates the release process by creating a GitHub Release whenever a new version tag is pushed.
# It runs the full test suite to ensure the release is stable before creating the release entry on GitHub.

name: Release

on:
  push:
    tags:
      - "v*.*.*"   # Triggers on tags like v1.0.0, v1.1.0

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run full test suite
        run: pytest tests/ -q --tb=short --ignore=tests/test_dashboard.py

      - name: Extract tag name
        id: get_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ steps.get_tag.outputs.TAG }}";
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `AI Career Agent ${tag}`,
              body: `Release ${tag}\n\nSee docs/V1_CLOSURE_REPORT.md for full details.`,
              draft: false,
              prerelease: tag.includes("-"),
            });
            console.log(`Created release: ${release.html_url}`);
