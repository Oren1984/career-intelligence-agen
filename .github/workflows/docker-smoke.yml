# This workflow performs a smoke test of the Docker build process.
# It builds the Docker image and runs a few basic checks to ensure the image is functional.

name: Docker Smoke Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-career-agent:smoke-test .

      - name: Verify image exists
        run: docker image inspect ai-career-agent:smoke-test

      - name: Smoke test — import check
        run: |
          docker run --rm ai-career-agent:smoke-test \
            python -c "
          from app.collectors.israel.drushim_collector import DrushimCollector
          from app.dedup.dedup_engine import DedupEngine
          from app.notifications.console_notifier import ConsoleNotifier
          from app.notifications.notification_orchestrator import NotificationOrchestrator
          from app.integrations.gmail.gmail_mock import GmailMockClient
          print('Docker smoke test: all imports OK')
          "

      - name: Smoke test — init_db
        run: |
          docker run --rm ai-career-agent:smoke-test \
            python scripts/init_db.py

      - name: Cleanup
        if: always()
        run: docker rmi ai-career-agent:smoke-test || true
