# This workflow performs security scans using Bandit for static code analysis
# and pip-audit for dependency vulnerability checks.
# It runs on pushes and pull requests to main, as well as on a weekly schedule.

name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 5 * * 1"   # Weekly on Monday at 05:00 UTC

jobs:
  bandit:
    name: Bandit Static Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          bandit -r app/ scripts/ \
            -ll \
            --exclude app/__pycache__,app/integrations/gmail/gmail_client.py \
            -f json -o bandit-report.json || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  pip-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip install -r requirements.txt
          pip-audit --ignore-vuln PYSEC-2022-43012 || true
