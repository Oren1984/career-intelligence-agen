# automation/n8n/docker-compose.n8n.yml

# n8n workflow automation — FUTURE / NOT ACTIVATED

# STATUS: Do NOT run this in production until the bridge webhook is implemented.

# To start n8n standalone (for exploration):
#   cd automation/n8n
#   docker compose -f docker-compose.n8n.yml up

# Then open: http://localhost:5678

version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: ai-career-agent-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # WEBHOOK_URL must match the host where n8n is reachable
      - WEBHOOK_URL=http://localhost:5678/
      # Optional: set timezone
      - GENERIC_TIMEZONE=Asia/Jerusalem
      # Optional: basic auth (recommended for any exposed instance)
      # - N8N_BASIC_AUTH_ACTIVE=true
      # - N8N_BASIC_AUTH_USER=admin
      # - N8N_BASIC_AUTH_PASSWORD=changeme
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/.n8n/workflows:ro

volumes:
  n8n_data:
    driver: local
